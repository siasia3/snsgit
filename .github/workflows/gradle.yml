name: Java CI/CD with Gradle

on:
  push:
    branches: [ "master" ] # 본인의 메인 브랜치 이름 확인 (main 또는 master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    # 1. 자바 설치 (스프링 버전과 맞추세요)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 2. 빌드 실행
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew clean build -x test

    # 3. 서버로 JAR 파일 전송 (SCP)
    - name: Copy JAR to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        source: "build/libs/*.jar"
        target: "/home/ubuntu/app"
        strip_components: 2

    # 4. 서버에서 구 버전 끄고 신규 버전 실행 (SSH)
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 8080 포트를 점유 중인 기존 프로세스 종료
          sudo fuser -k 8080/tcp || true
          # 새 JAR 실행 (백그라운드에서 로그 남기며 실행)
          nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/nohup.out 2>&1 &
