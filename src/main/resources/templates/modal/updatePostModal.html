
<div th:fragment="updatePostModal">
    <div class="modal" id="modifyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 16px; overflow: hidden; border: none; box-shadow: 0 8px 32px rgba(0,0,0,0.13);">
                <div class="modal-header" style="justify-content: center; position: relative; border-bottom: 1px solid #efefef; padding: 18px 20px;">
                    <h5 class="modal-title" style="font-size: 16px; font-weight: 700; margin: 0;">게시물 수정하기</h5>
                    <button type="button" onclick="closeUpdateModal()" style="position: absolute; right: 16px; background: none; border: none; font-size: 20px; color: #888; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <form id="updateForm" enctype="multipart/form-data">
                    <div class="modal-body modalForm" style="padding: 20px;">
                        <div id="modifyPostId" style="display: none" data-post-id=""></div>
                        <div id="attachmentId" style="display: none" data-attach-id=""></div>

                        <!-- 게시글 내용 -->
                        <textarea id="modifyPostContent" rows="4" placeholder="내용을 입력하세요..."
                            style="width: 100%; border: none; outline: none; resize: none; font-size: 15px; color: #222; background: transparent; font-family: inherit; line-height: 1.6; min-height: 80px;"></textarea>

                        <!-- 이미지/동영상 업로드 -->
                        <label for="modifyFileInput" style="display: block; border: 2px dashed #e0e0e0; border-radius: 12px; padding: 20px; text-align: center; color: #aaa; cursor: pointer; transition: border-color 0.2s; margin-top: 12px; margin-bottom: 12px;"
                            onmouseover="this.style.borderColor='#dd2a7b';this.style.color='#dd2a7b';this.style.background='#fff5f9';"
                            onmouseout="this.style.borderColor='#e0e0e0';this.style.color='#aaa';this.style.background='';">
                            <i class="fa-regular fa-image" style="font-size: 26px; display: block; margin-bottom: 6px;"></i>
                            <span style="font-size: 13px;">사진/동영상 교체</span>
                        </label>
                        <input type="file" id="modifyFileInput" accept="image/*, video/*" multiple style="display: none;"/>

                        <!-- 파일 미리보기 캐러셀 -->
                        <div id="updateDynamicCarousel" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-inner carouselItems"></div>
                            <button class="carousel-control-prev prevButton" type="button" data-bs-target="#updateDynamicCarousel" data-bs-slide="prev" style="display: none;">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next nextButton" type="button" data-bs-target="#updateDynamicCarousel" data-bs-slide="next" style="display: none;">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                    </div>
                </form>
                <div class="modal-footer" style="border-top: 1px solid #efefef; padding: 14px 20px; display: flex; justify-content: flex-end; gap: 8px;">
                    <button type="button" onclick="closeUpdateModal()"
                        style="background: #f0f0f0; border: none; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: 600; color: #555; cursor: pointer;">
                        취소
                    </button>
                    <button type="button" id="updateBtn"
                        style="background: linear-gradient(90deg, #f58529, #dd2a7b); border: none; border-radius: 8px; padding: 8px 24px; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer;">
                        수정하기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
