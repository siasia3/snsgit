<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 페이지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center">로그인</h2>
            <form th:action="@{/process-login}" method="post" class="mt-4">
                <div class="mb-3">
                    <label for="username" class="form-label">아이디</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>
            <div class="text-center mt-3">
                <span>소셜 로그인</span>
                <div class="d-flex justify-content-center mt-2">
                    <a th:href="@{/oauth2/authorization/naver}" class="btn btn-success mx-1">네이버 로그인</a>
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-danger mx-1">구글 로그인</a>
                </div>
            </div>
            <div class="text-center mt-4">
                <span>회원이 아니신가요?</span>
                <a th:href="@{/member/signup}" class="text-decoration-none">회원가입</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
