<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center">회원가입</h2>
            <form th:action="@{/member/signup}" method="post" class="mt-4" id="signupForm">
                <div class="mb-3">
                    <label for="userId" class="form-label">아이디</label>
                    <div class="input-group">
                        <input type="text" id="userId" name="userId" class="form-control" required>
                        <button type="button" id="checkUserIdBtn" class="btn btn-outline-primary">중복 확인</button>
                    </div>
                    <div id="userIdCheckResult" class="form-text mt-1"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="nickname" class="form-label">닉네임</label>
                    <div class="input-group">
                        <input type="text" id="nickname" name="nickname" class="form-control" required>
                        <button type="button" id="checkNicknameBtn" class="btn btn-outline-primary">중복 확인</button>
                    </div>
                    <div id="nicknameCheckResult" class="form-text mt-1"></div>
                </div>

                <div class="mb-3">
                    <label for="contact" class="form-label">전화번호</label>
                    <input type="text" pattern="^01[0-9]\d{7,8}$" id="contact" name="contact" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="birthdate" class="form-label">생년월일</label>
                    <input type="date" id="birthdate" name="birthdate" min="1900-01-01" max="2013-01-01" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">성별</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="MALE" required>
                            <label class="form-check-label" for="male">남성</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="FEMALE">
                            <label class="form-check-label" for="female">여성</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100">회원가입</button>
            </form>

            <div class="text-center mt-4">
                <span>이미 회원이신가요?</span>
                <a th:href="@{/}" class="text-decoration-none">로그인</a>
            </div>
        </div>
    </div>
</div>

<script>

    let isUserIdChecked = false;
    let isNicknameChecked = false;

    document.getElementById("checkNicknameBtn").addEventListener("click", async function() {
        const nickname = document.getElementById("nickname").value;
        const resultDiv = document.getElementById("nicknameCheckResult");

        if (!nickname) {
            resultDiv.textContent = "닉네임을 입력해주세요.";
            resultDiv.style.color = "red";
            return;
        }

        let data = await checkNickname(nickname);

        if (data.state) {
            resultDiv.textContent = data.message;
            resultDiv.style.color = "green";
        } else {
            resultDiv.textContent = data.message;
            resultDiv.style.color = "red";
        }
    });
    document.getElementById("checkUserIdBtn").addEventListener("click", async function (){
        const userId = document.getElementById("userId").value;
        const resultDiv = document.getElementById("userIdCheckResult");


        if (!userId) {
            resultDiv.textContent = "회원 아이디를 입력해주세요.";
            resultDiv.style.color = "red";
            return;
        }

        let data = await checkUserId(userId);

        if (data.state) {
            resultDiv.textContent = data.message;
            resultDiv.style.color = "green";
        } else {
            resultDiv.textContent = data.message;
            resultDiv.style.color = "red";
        }
    });

    document.getElementById("signupForm").addEventListener("submit", async function(event){
       event.preventDefault();
       if(!isNicknameChecked || !isUserIdChecked){
           alert('중복 확인을 해주세요.');
           return;
       }
       let form = document.getElementById("signupForm");
       let formData = new FormData(form);
        let response = await signup(formData);

        if (response.ok) {
            alert('회원가입이 완료되었습니다.');
            window.location.href = '/';
            return;
        }

        //입력 문제
        if (response.status === 400) {
            // validation 문제
            alert('입력값을 다시 확인해주세요.');
            return;
        }

        //중복인 경우
        if (response.status === 409) {
            alert("닉네임 또는 아이디가 중복입니다.");
            return;
        }

        // 기타 에러
        alert('알 수 없는 오류가 발생했습니다.');

    });
</script>
<script src="/js/signup.js"></script>
</body>
</html>
