<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Horizon SNS</title>
    <script src="https://kit.fontawesome.com/45c159df80.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div id="loadingSpinner" class="d-flex justify-content-center align-items-center position-fixed top-0 left-0 w-100 h-100 bg-light bg-opacity-50" style="z-index: 1050;">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>
<div class="wrapper">
    <header>
        <div th:replace="~{fragments/header :: header}">
        </div>
    </header>

    <div class="myContainer">
        <aside class="sidebar-left">
            <div th:replace="~{fragments/sidebar-left :: sidebar-left}"></div>
        </aside>

        <main layout:fragment="content">
        </main>

        <aside class="sidebar-right">
            <div th:replace="~{fragments/sidebar-right :: sidebar-right}"></div>
        </aside>
    </div>

    <!--<footer>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </footer>-->
</div>

<div th:replace="~{modal/createPostModal :: createPostModal}"></div>
<div th:replace="~{modal/updatePostModal :: updatePostModal}"></div>
<div th:replace="~{modal/messageModal :: messageModal}"></div>


<script src="/js/leftside.js"></script>
<script src="/js/token.js"></script>
<script src="/js/search.js"></script>
<script src="/js/currentMember.js"></script>
<script src="/js/friend.js"></script>
<script src="/js/post.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/chat.js" defer></script>
<script src="/js/messageModal.js"></script>

<th:block layout:fragment="script"></th:block>
<script>
    window.addEventListener("load", async function (){
        if (!sessionStorage.getItem('userId')) {
            await getMemberInfo();
            renderHeaderMemberInfo();

            let friends = await getFriends();
            renderFriendList(friends);

        }else if(sessionStorage.getItem('userId')){
            renderHeaderMemberInfo();
            let friends = await getFriends();
            renderFriendList(friends);
        }

    });


    //검색 회원Preview 클릭시 회원페이지 이동
    document.getElementById('searchPreview').addEventListener('click',function (event) {
        let preview = event.target.closest('.preview');
        if (preview) {
            let nickname = preview.querySelector('.previewNickName').textContent;
            window.location.href = `/user/${nickname}`;
        }
    });

    //메시지 모달
    document.getElementById('messagePage').addEventListener('click',function (){
        openMessageModal();
    });

    //친구요청 페이지
    document.getElementById('friendPage').addEventListener('click',function (){
        window.location.href = `/friendRequest`;
    });

    //좋아요 페이지
    document.getElementById('likePage').addEventListener('click',function (){
        window.location.href = `/member/likes`;
    });
    document.getElementById('myPage').addEventListener('click',function (){
        let myNickname = sessionStorage.getItem('nickname');
        window.location.href = `/user/${myNickname}`;
    })


    //로그아웃 클릭
    document.getElementById('logout').addEventListener('click',function (){
        logout();
    });

    //검색내용을 지운 경우 UI 지우기
    document.getElementById('mySearch').addEventListener('input',function (){
        if (this.value.trim() === "") {
            deleteSearchUI()
        }
    });

    //검색을 하는 경우 UI 생성
    document.getElementById('mySearch').addEventListener("input", debounce((event) => {
        if (event.target.value.trim() !== '') {
            previewMember(event.target.value).then(result => {
                previewMemberUI(result);
            });

        }
    }, 300));

    //헤더 회원이름 클릭시 개인페이지 이동
    document.getElementById('memberName').addEventListener('click',function (){
        let memberName = this.children[0].textContent;
        let nickname = memberName.slice(0,-1);
        window.location.href = `/user/${nickname}`;
    });

    //헤더 왼쪽 로고 클릭시 메인페이지
    document.getElementById("header-left").addEventListener('click',function (){
       window.location.href = `/main`;
    });

</script>

</body>
</html>
